<!DOCTYPE html>
<html>
<head>
    <title>NEXAI Repair Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            background: #0f172a;
            color: #00f0ff;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }
        button {
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            background: #00f0ff;
            border: none;
        }
    </style>
</head>
<body>

<h1>NEXAI Repair Center</h1>

<button onclick="detect()">Detect Device</button>
<button onclick="flash()">Flash Firmware</button>
<button onclick="diagnose()">Run Diagnostics</button>

<script>
function detect() {
    alert("Device detection started...");
}
function flash() {
    alert("Flashing firmware...");
}
function diagnose() {
    alert("Running diagnostics...");
}
</script>

</body>
</html>
